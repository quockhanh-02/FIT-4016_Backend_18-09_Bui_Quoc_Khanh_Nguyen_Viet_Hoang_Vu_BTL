<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"> <!-- UTF-8 encoding -->
<title>Accident Management</title> <!-- Page title -->

<style>

/* ===== BODY ===== */
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1100px;
    margin: auto;
}

h1 {
    margin-bottom: 20px;
}

/* ===== TOP BAR ===== */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Back button */
.back-btn {
    background: #6c757d;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
}

/* ===== CARD ===== */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-top: 20px;
}

/* ===== FORM ===== */
.form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* ===== BUTTON ===== */
button {
    padding: 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

/* Primary button */
.btn-primary {
    width: 100%;
    background: #1e64c8;
    color: white;
    font-weight: bold;
}

/* Delete button */
.btn-delete {
    background: red;
    color: white;
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #222;
    color: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

</style>
</head>

<body>

<div class="container">

    <!-- ===== HEADER ===== -->
    <div class="top-bar">
        <h1>🚨 Accident Management</h1>
        <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>

    <!-- ===== FORM ===== -->
    <div class="card">

        <div class="form-row">
            <!-- Vehicle ID -->
            <input type="number" id="vehicleId" placeholder="Vehicle ID">

            <!-- Driver ID -->
            <input type="number" id="driverId" placeholder="Driver ID">

            <!-- Location -->
            <input type="text" id="location" placeholder="Location">
        </div>

        <div class="form-row">
            <!-- Damage cost -->
            <input type="number" id="damageCost" placeholder="Cost">

            <!-- Description -->
            <input type="text" id="description" placeholder="Description">

            <!-- Date time -->
            <input type="datetime-local" id="accidentDate">
        </div>

        <!-- Submit button -->
        <button class="btn-primary" onclick="saveAccident()">Add Accident</button>

    </div>

    <!-- ===== TABLE ===== -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Vehicle</th>
                    <th>Driver</th>
                    <th>Location</th>
                    <th>Cost</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <!-- Data render -->
            <tbody id="accidentTable"></tbody>
        </table>
    </div>

</div>

<script>

// ===== API URL =====
const API_URL = "/api/accidents";

// ===== LOAD DATA =====
async function loadAccidents() {

    const res = await fetch(API_URL); // GET data
    const data = await res.json();

    const table = document.getElementById("accidentTable");
    table.innerHTML = ""; // Clear table

    // Loop data
    data.forEach(a => {
        table.innerHTML += `
            <tr>
                <td>${a.id}</td>

                <!-- Show license plate if available -->
                <td>${a.vehicle ? a.vehicle.licensePlate : a.vehicleId}</td>

                <!-- Show driver name if available -->
                <td>${a.driver ? a.driver.fullName : a.driverId}</td>

                <td>${a.location}</td>

                <!-- Format money -->
                <td>${formatMoney(a.damageCost)}</td>

                <td>
                    <button class="btn-delete"
                    onclick="deleteAccident(${a.id})">
                    Delete
                    </button>
                </td>
            </tr>
        `;
    });
}

// ===== SAVE DATA =====
async function saveAccident() {

    // Get datetime value
    const dateValue = document.getElementById("accidentDate").value;

    // Validate date
    if (!dateValue) {
        alert("Please select a date");
        return;
    }

    // Create object
    const data = {
        vehicleId: parseInt(document.getElementById("vehicleId").value),
        driverId: parseInt(document.getElementById("driverId").value),
        location: document.getElementById("location").value,
        damageCost: parseFloat(document.getElementById("damageCost").value),
        description: document.getElementById("description").value,

        // Convert to ISO format for backend
        accidentDate: new Date(dateValue).toISOString()
    };

    // Send POST request
    const res = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    // Handle result
    if (res.ok) {
        alert("Added successfully");
        clearForm(); // Reset form
        loadAccidents(); // Reload data
    } else {
        const err = await res.text();
        console.error(err);
        alert("Error: " + err);
    }
}

// ===== DELETE =====
async function deleteAccident(id) {

    await fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    });

    loadAccidents(); // Reload
}

// ===== FORMAT MONEY =====
function formatMoney(number) {

    // Format number to currency
    return number
        ? number.toLocaleString('en-US') + " USD"
        : "";
}

// ===== CLEAR FORM =====
function clearForm() {

    document.getElementById("vehicleId").value = "";
    document.getElementById("driverId").value = "";
    document.getElementById("location").value = "";
    document.getElementById("damageCost").value = "";
    document.getElementById("description").value = "";
    document.getElementById("accidentDate").value = "";
}

// ===== INIT =====
loadAccidents(); // Load when page opens

</script>

</body>
</html>
