<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" /> <!-- Thiết lập bảng mã UTF-8 -->
    <title>Vehicle Management</title> <!-- Tiêu đề tab trình duyệt -->

    <!-- Import Bootstrap CSS để dùng giao diện đẹp -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light"> <!-- Nền màu xám nhạt -->

<div class="container mt-4"> <!-- Container chính -->

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🚗 Vehicle Management</h2> <!-- Tiêu đề -->
        <a href="/index.html" class="btn btn-secondary">⬅ Back to Home</a> <!-- Nút quay về -->
    </div>

    <!-- Form thêm xe -->
    <div class="card p-3 mb-4 shadow-sm">
        <div class="row g-2">

            <!-- Nhập biển số -->
            <div class="col-md-4">
                <input type="text" id="licensePlate" class="form-control" placeholder="License Plate">
            </div>

            <!-- Nhập định mức nhiên liệu -->
            <div class="col-md-4">
                <input type="number" id="fuelNorm" class="form-control" placeholder="Fuel Norm">
            </div>

            <!-- Chọn loại xe -->
            <div class="col-md-4">
                <select id="vehicleType" class="form-select">
                    <option value="">Select Vehicle Type</option>
                    <option value="Car">Car</option>
                    <option value="Motorbike">Motorbike</option>
                </select>
            </div>

            <!-- Nút thêm xe -->
            <div class="col-md-12 d-grid mt-2">
                <button type="button" onclick="addVehicle()" class="btn btn-primary">
                    Add Vehicle
                </button>
            </div>

        </div>
    </div>

    <!-- Bảng hiển thị xe -->
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>License Plate</th>
                        <th>Fuel Norm</th>
                        <th>Vehicle Type</th>
                        <th style="width:180px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="vehicleTable"></tbody> <!-- Dữ liệu sẽ render ở đây -->
            </table>
        </div>
    </div>

</div>

<!-- Modal chỉnh sửa -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Header modal -->
            <div class="modal-header">
                <h5 class="modal-title">Edit Vehicle</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- Body modal -->
            <div class="modal-body">

                <input type="hidden" id="editId"> <!-- Lưu ID xe -->

                <!-- Sửa biển số -->
                <div class="mb-3">
                    <label class="form-label">License Plate</label>
                    <input type="text" id="editLicensePlate" class="form-control">
                </div>

                <!-- Sửa định mức -->
                <div class="mb-3">
                    <label class="form-label">Fuel Norm</label>
                    <input type="number" id="editFuelNorm" class="form-control">
                </div>

                <!-- Sửa loại xe -->
                <div class="mb-3">
                    <label class="form-label">Vehicle Type</label>
                    <select id="editVehicleType" class="form-select">
                        <option value="Car">Car</option>
                        <option value="Motorbike">Motorbike</option>
                    </select>
                </div>

            </div>

            <!-- Footer modal -->
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="updateVehicle()">Update</button>
            </div>

        </div>
    </div>
</div>

<!-- Import Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

// URL API backend
const apiUrl = "/api/Vehicles";

// Biến modal chỉnh sửa
let editModal;

// LOAD DANH SÁCH XE
async function loadVehicles() {

    const res = await fetch(apiUrl); // Gọi API GET
    const data = await res.json(); // Chuyển dữ liệu JSON

    const table = document.getElementById("vehicleTable");
    table.innerHTML = ""; // Xóa dữ liệu cũ

    // Duyệt từng xe
    data.forEach(v => {
        table.innerHTML += `
            <tr>
                <td>${v.id}</td> <!-- ID -->
                <td>${v.licensePlate}</td> <!-- Biển số -->
                <td>${v.fuelNorm}</td> <!-- Định mức -->
                <td>${v.vehicleType ?? "N/A"}</td> <!-- Loại xe -->
                <td>
                    <!-- Nút sửa -->
                    <button class="btn btn-warning btn-sm me-1"
                        onclick="openEditModal(${v.id}, '${v.licensePlate}', ${v.fuelNorm}, '${v.vehicleType}')">
                        Edit
                    </button>

                    <!-- Nút xóa -->
                    <button class="btn btn-danger btn-sm"
                        onclick="deleteVehicle(${v.id})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });
}

// THÊM XE
async function addVehicle() {

    // Lấy dữ liệu từ input
    const licensePlate = document.getElementById("licensePlate").value;
    const fuelNorm = parseFloat(document.getElementById("fuelNorm").value);
    const vehicleType = document.getElementById("vehicleType").value;

    // Kiểm tra dữ liệu
    if (!licensePlate || !vehicleType) {
        alert("Please fill all fields!");
        return;
    }

    // Gửi POST lên server
    const res = await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            licensePlate,
            fuelNorm,
            vehicleType
        })
    });

    // Nếu lỗi
    if (!res.ok) {
        const error = await res.text();
        alert(error);
        return;
    }

    // Reset form
    document.getElementById("licensePlate").value = "";
    document.getElementById("fuelNorm").value = "";
    document.getElementById("vehicleType").value = "";

    loadVehicles(); // Reload danh sách
}

// MỞ MODAL SỬA
function openEditModal(id, plate, fuel, type) {

    // Gán dữ liệu vào form
    document.getElementById("editId").value = id;
    document.getElementById("editLicensePlate").value = plate;
    document.getElementById("editFuelNorm").value = fuel;
    document.getElementById("editVehicleType").value = type;

    // Tạo modal
    editModal = new bootstrap.Modal(document.getElementById('editModal'));
    editModal.show(); // Hiển thị
}

// CẬP NHẬT XE
async function updateVehicle() {

    // Lấy dữ liệu
    const id = document.getElementById("editId").value;
    const licensePlate = document.getElementById("editLicensePlate").value;
    const fuelNorm = parseFloat(document.getElementById("editFuelNorm").value);
    const vehicleType = document.getElementById("editVehicleType").value;

    // Gửi PUT
    const res = await fetch(`${apiUrl}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: parseInt(id),
            licensePlate,
            fuelNorm,
            vehicleType
        })
    });

    if (!res.ok) {
        alert("Update failed!");
        return;
    }

    editModal.hide(); // Đóng modal
    loadVehicles(); // Reload
}

// XÓA XE
async function deleteVehicle(id) {

    // Xác nhận
    if (!confirm("Are you sure you want to delete this vehicle?")) return;

    // Gửi DELETE
    await fetch(`${apiUrl}/${id}`, {
        method: "DELETE"
    });

    loadVehicles(); // Reload
}

// Khi load trang thì gọi loadVehicles
document.addEventListener("DOMContentLoaded", loadVehicles);

</script>

</body>
</html>
