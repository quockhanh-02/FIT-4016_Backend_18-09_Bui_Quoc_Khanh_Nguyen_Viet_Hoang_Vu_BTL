<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"> <!-- Set bảng mã UTF-8 -->
<title>Fleet Management Login</title> <!-- Tiêu đề trang -->

<!-- Import Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Style cho toàn bộ body */
body{
height:100vh; /* Chiều cao full màn hình */
background:linear-gradient(135deg,#0f172a,#1e293b); /* Gradient nền */
display:flex; /* Dùng flexbox */
justify-content:center; /* Căn giữa ngang */
align-items:center; /* Căn giữa dọc */
font-family:Arial; /* Font chữ */
}

/* Card login */
.login-card{
width:380px; /* Chiều rộng */
background:white; /* Nền trắng */
padding:40px; /* Padding */
border-radius:12px; /* Bo góc */
box-shadow:0 15px 35px rgba(0,0,0,0.3); /* Đổ bóng */
}

/* Icon logo */
.logo{
font-size:45px; /* Kích thước icon */
text-align:center; /* Căn giữa */
margin-bottom:10px;
}

/* Tiêu đề */
.title{
text-align:center;
font-weight:bold;
margin-bottom:25px;
}

/* Nút login full width */
.btn-login{
width:100%;
}

/* Footer nhỏ */
.footer{
text-align:center;
font-size:13px;
margin-top:20px;
color:#666;
}

</style>

</head>

<body>

<!-- Card login -->
<div class="login-card">

<!-- Icon -->
<div class="logo">🚚</div>

<!-- Title -->
<h4 class="title">Fleet Management System</h4>

<!-- Input username -->
<input 
id="username" <!-- ID để JS lấy dữ liệu -->
class="form-control mb-3" <!-- Bootstrap style -->
placeholder="Username" <!-- Placeholder -->
onkeypress="enterLogin(event)" <!-- Nhấn Enter để login -->
>

<!-- Input password -->
<input 
id="password"
type="password" <!-- Ẩn mật khẩu -->
class="form-control mb-3"
placeholder="Password"
onkeypress="enterLogin(event)"
>

<!-- Button login -->
<button 
id="loginBtn"
onclick="login()" <!-- Click gọi hàm login -->
class="btn btn-primary btn-login">
Login
</button>

<!-- Footer -->
<div class="footer">
Fleet Management System
</div>

</div>

<script>

// Hàm xử lý nhấn Enter
function enterLogin(e){
if(e.key === "Enter"){ // Nếu nhấn Enter
login(); // Gọi login
}
}

// Hàm login chính
async function login(){

// Lấy dữ liệu input
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;
const btn = document.getElementById("loginBtn");

// Validate rỗng
if(!username || !password){
alert("Enter username and password");
return;
}

// Đổi trạng thái nút
btn.innerText = "Checking...";
btn.disabled = true;

try{

// Gửi request POST đến API
const res = await fetch("/api/Auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json" // Gửi JSON
},

body:JSON.stringify({
username:username,
password:password
})

});

// Nếu login thành công
if(res.ok){

// Lưu trạng thái đăng nhập vào localStorage
localStorage.setItem("logged","true");

// Chuyển sang trang chính
window.location.href="index.html";

}
else{

// Sai tài khoản
alert("Wrong username or password");

}

}catch(err){

// Lỗi server
alert("Server error");

}

// Reset nút
btn.innerText = "Login";
btn.disabled = false;

}

</script>

</body>

</html>
