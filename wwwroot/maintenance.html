<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" /> <!-- Set UTF-8 encoding -->
<title>Accident Management</title> <!-- Page title -->

<!-- Import Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light"> <!-- Light background -->

<div class="container mt-4"> <!-- Main container -->

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
<h2>🚨 Accident Management</h2> <!-- Title -->
<a href="/index.html" class="btn btn-secondary">⬅ Back to Home</a> <!-- Back button -->
</div>

<!-- FORM -->
<div class="card p-3 mb-4 shadow-sm">

<div class="row g-2">

<!-- Vehicle ID -->
<div class="col-md-4">
<input type="number" id="vehicleId" class="form-control" placeholder="Vehicle ID">
</div>

<!-- Driver ID -->
<div class="col-md-4">
<input type="number" id="driverId" class="form-control" placeholder="Driver ID">
</div>

<!-- Location -->
<div class="col-md-4">
<input type="text" id="location" class="form-control" placeholder="Location">
</div>

<!-- Cost -->
<div class="col-md-4">
<input type="number" id="cost" class="form-control" placeholder="Cost">
</div>

<!-- Description -->
<div class="col-md-4">
<input type="text" id="description" class="form-control" placeholder="Description">
</div>

<!-- Date -->
<div class="col-md-4">
<input type="datetime-local" id="date" class="form-control"> <!-- Date & time picker -->
</div>

<!-- Submit button -->
<div class="col-md-12 d-grid mt-2">
<button id="submitBtn" onclick="saveAccident()" class="btn btn-primary">
Add Accident
</button>
</div>

</div>
</div>

<!-- TABLE -->
<div class="card shadow-sm">

<div class="card-body">

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Vehicle</th>
<th>Driver</th>
<th>Location</th>
<th>Cost</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="accidentTable"></tbody> <!-- Data render here -->

</table>

</div>
</div>

</div>

<script>

// API endpoint
const apiUrl = "/api/Accidents";

// Store ID đang edit
let editingId = null;

// ========================
// LOAD DATA
// ========================
async function loadData(){

const res = await fetch(apiUrl); // Call API GET
const data = await res.json(); // Convert JSON

const table = document.getElementById("accidentTable");
table.innerHTML = ""; // Clear old data

// Loop each accident
data.forEach(a=>{

// Lấy thông tin vehicle + driver (nếu có)
const vehicle = a.vehicle?.licensePlate || "";
const driver = a.driver?.fullName || "";

// Render row
table.innerHTML += `
<tr>
<td>${a.id}</td>
<td>${vehicle}</td>
<td>${driver}</td>
<td>${a.location}</td>
<td>${a.cost}</td>

<td>

<!-- Edit button -->
<button class="btn btn-warning btn-sm me-2"
onclick="editAccident(${a.id}, ${a.vehicleId}, ${a.driverId}, '${a.location}', ${a.cost}, '${a.description}', '${a.date}')">
Edit
</button>

<!-- Delete button -->
<button class="btn btn-danger btn-sm"
onclick="deleteAccident(${a.id})">
Delete
</button>

</td>

</tr>
`;
});
}

// ========================
// SAVE (ADD + UPDATE)
// ========================
async function saveAccident(){

// Get data from form
const vehicleId = parseInt(document.getElementById("vehicleId").value);
const driverId = parseInt(document.getElementById("driverId").value);
const location = document.getElementById("location").value;
const cost = parseFloat(document.getElementById("cost").value);
const description = document.getElementById("description").value;
const date = document.getElementById("date").value;

let res;

// ===================
// UPDATE
// ===================
if(editingId){

res = await fetch(`${apiUrl}/${editingId}`,{
method:"PUT",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
id: editingId,
vehicleId,
driverId,
location,
cost,
description,
date
})
});

editingId = null; // Reset edit mode
document.getElementById("submitBtn").innerText = "Add Accident";

}

// ===================
// CREATE
// ===================
else{

res = await fetch(apiUrl,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
vehicleId,
driverId,
location,
cost,
description,
date
})
});

}

// Nếu lỗi
if(!res.ok){
alert(await res.text());
return;
}

// Reset form
document.querySelectorAll("input").forEach(i=>i.value="");

// Reload data
loadData();

}

// ========================
// EDIT
// ========================
function editAccident(id, vehicleId, driverId, location, cost, description, date){

editingId = id; // Set edit mode

// Fill data vào form
document.getElementById("vehicleId").value = vehicleId;
document.getElementById("driverId").value = driverId;
document.getElementById("location").value = location;
document.getElementById("cost").value = cost;
document.getElementById("description").value = description;
document.getElementById("date").value = date;

// Change button text
document.getElementById("submitBtn").innerText = "Update Accident";

// Scroll lên trên để thấy form
window.scrollTo({top:0,behavior:"smooth"});
}

// ========================
// DELETE
// ========================
async function deleteAccident(id){

// Confirm trước khi xóa
if(!confirm("Delete this accident?")) return;

// Call DELETE API
await fetch(`${apiUrl}/${id}`,{method:"DELETE"});

// Reload data
loadData();
}

// ========================
// Load data khi mở trang
// ========================
document.addEventListener("DOMContentLoaded", loadData);

</script>

</body>
</html>
